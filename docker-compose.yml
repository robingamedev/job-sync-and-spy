services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: pocketspy
      POSTGRES_PASSWORD: localpassword
      POSTGRES_DB: pocketspy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pocketspy -d pocketspy"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3737:3000"
    environment:
      - DATABASE_URL=postgresql://pocketspy:localpassword@db:5432/pocketspy?schema=public
      - AUTH_TRUST_HOST=true
      - NEXTAUTH_URL=http://localhost:3737
    depends_on:
      db:
        condition: service_healthy

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    restart: always
    environment:
      - DATABASE_URL=postgresql://pocketspy:localpassword@db:5432/pocketspy?schema=public
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
